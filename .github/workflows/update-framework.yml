name: Update Framework

on:
  workflow_dispatch:
    inputs:
      include-prerelease:
        description: Include CorianderPHP pre-releases.
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [framework-released]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-framework
  cancel-in-progress: false

jobs:
  update-framework:
    name: Update CorianderPHP core
    runs-on: ubuntu-latest

    env:
      APP_ENV: ci
      APP_DEBUG: "0"
      PROJECT_URL: https://corianderphp.com
      PUBLIC_URL_PREFIX: ""
      TRUSTED_PROXIES: 127.0.0.1,::1
      CORIANDER_UPDATER_ENABLED: "1"
      CORIANDER_UPDATER_MAX_ATTEMPTS_PER_HOUR: "0"

    steps:
      - name: Checkout documentation repository
        uses: actions/checkout@v7

      - name: Prepare pull request metadata
        id: pr
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_VERSION: ${{ github.event.client_payload.version }}
          RELEASE_URL: ${{ github.event.client_payload.release_url }}
          RELEASE_BODY: ${{ github.event.client_payload.release_body }}
        run: |
          version="${RELEASE_VERSION:-latest}"
          release_url="${RELEASE_URL:-https://github.com/CorianderPHP/CorianderPHP/releases}"
          branch="automation/update-framework"
          title="⬆️ Update CorianderPHP framework."

          if [[ "$EVENT_NAME" == "repository_dispatch" && "$version" != "latest" ]]; then
            safe_version="$(printf '%s' "$version" | sed -E 's#[^A-Za-z0-9._-]+#-#g')"
            branch="framework/update-${safe_version}"
            title="⬆️ Update CorianderPHP to ${version}."
          fi

          {
            echo "branch=$branch"
            echo "title=$title"
            echo "body_path=$RUNNER_TEMP/update-framework-pr-body.md"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Framework Update"
            echo
            echo "CorianderPHP version: \`$version\`"
            echo
            echo "Release: $release_url"
            echo
            echo "## Release Notes"
            echo
            if [[ -n "${RELEASE_BODY:-}" ]]; then
              printf '%s\n' "$RELEASE_BODY"
            else
              echo "No release notes were provided by the triggering event."
            fi
            echo
            echo "## Automated Changes"
            echo
            echo "- Updated framework-managed files with \`php coriander update --yes\`."
            echo "- Rebuilt frontend assets."
            echo "- Regenerated guided project downloads."
            echo "- Ran the documentation test suite."
            echo
            echo "## Documentation Review Checklist"
            echo
            echo "- [ ] Check installation and start-project docs."
            echo "- [ ] Check routing and middleware docs."
            echo "- [ ] Check controllers and views docs."
            echo "- [ ] Check database and SQL docs."
            echo "- [ ] Check guided projects and demo downloads."
            echo
            echo "This PR was created by \`.github/workflows/update-framework.yml\`."
          } > "$RUNNER_TEMP/update-framework-pr-body.md"

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: zip, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: nodejs/package-lock.json

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install Node.js dependencies
        working-directory: nodejs
        run: npm ci

      - name: Update CorianderPHP framework
        shell: bash
        run: |
          args=(update --yes)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.include-prerelease }}" == "true" ]]; then
            args+=(--pre-release)
          fi

          php coriander "${args[@]}"

      - name: Rebuild frontend assets
        run: php coriander nodejs run build-prod

      - name: Regenerate project downloads
        run: composer generate-downloads

      - name: Run documentation test suite
        run: composer test

      - name: Create framework update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: ${{ steps.pr.outputs.branch }}
          delete-branch: true
          title: ${{ steps.pr.outputs.title }}
          commit-message: "⬆️ Update CorianderPHP framework."
          body-path: ${{ steps.pr.outputs.body_path }}
          labels: dependencies, framework
